name: Close Issue on PR Close

on:
  pull_request:
    types: [closed]

jobs:
  close-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Close linked issue and check parent tracking issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prMerged = context.payload.pull_request.merged;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Extract child issue number from "Closes #123" pattern
            const match = prBody.match(/Closes #(\d+)/i);
            if (!match) {
              console.log('No linked issue found in PR body');
              return;
            }

            const issueNumber = parseInt(match[1]);
            console.log(`Found linked issue #${issueNumber}`);

            // Fetch the issue
            let issueData;
            try {
              const { data } = await github.rest.issues.get({
                owner, repo, issue_number: issueNumber
              });
              issueData = data;
            } catch (error) {
              console.log(`Error fetching issue #${issueNumber}: ${error.message}`);
              return;
            }

            // Close the child issue if not already closed
            if (issueData.state !== 'closed') {
              const comment = prMerged
                ? `Closed via PR #${context.payload.pull_request.number} (merged)`
                : `Closed via PR #${context.payload.pull_request.number} (PR was closed without merging)`;

              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber, body: comment
              });
              await github.rest.issues.update({
                owner, repo, issue_number: issueNumber, state: 'closed'
              });
              console.log(`Closed issue #${issueNumber}`);
            } else {
              console.log(`Issue #${issueNumber} was already closed`);
            }

            // Check if this is a child of a tracking issue
            const issueBody = issueData.body || '';
            const parentMatch = issueBody.match(/Split from multi-service submission #(\d+)/i);
            if (!parentMatch) {
              console.log('Not a split child issue — no parent to check');
              return;
            }

            const parentNumber = parseInt(parentMatch[1]);
            console.log(`Issue #${issueNumber} is a child of tracking issue #${parentNumber}`);

            // Check if the parent tracking issue is still open
            let parentData;
            try {
              const { data } = await github.rest.issues.get({
                owner, repo, issue_number: parentNumber
              });
              parentData = data;
            } catch (error) {
              console.log(`Error fetching parent issue #${parentNumber}: ${error.message}`);
              return;
            }

            if (parentData.state === 'closed') {
              console.log(`Parent #${parentNumber} is already closed`);
              return;
            }

            // Search for any still-open child issues of this parent
            const searchQuery = `repo:${owner}/${repo} is:issue is:open "Split from multi-service submission #${parentNumber}" in:body`;
            console.log(`Searching for open siblings: ${searchQuery}`);

            const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
              q: searchQuery
            });

            console.log(`Open sibling issues remaining: ${searchResult.total_count}`);

            if (searchResult.total_count === 0) {
              // All children are closed — close the parent tracking issue
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: parentNumber,
                body: `All child submissions have been resolved. Closing this tracking issue.`
              });
              await github.rest.issues.update({
                owner, repo, issue_number: parentNumber, state: 'closed'
              });
              console.log(`Closed parent tracking issue #${parentNumber}`);
            } else {
              console.log(`${searchResult.total_count} child issue(s) still open — parent #${parentNumber} remains open`);
            }
