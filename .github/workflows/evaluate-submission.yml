name: Evaluate Submission

on:
  issues:
    types: [opened, labeled]

jobs:
  evaluate:
    # Trigger conditions:
    # 1. 'labeled' with 'submission' — covers issue templates that pre-apply the
    #    label (GitHub fires a user-context 'labeled' event) and manual additions.
    # 2. 'opened' without the 'submission' label already present — covers mobile /
    #    API submissions where the label is absent at creation and is later added
    #    by the auto-label workflow via GITHUB_TOKEN. GitHub suppresses workflow
    #    triggers for GITHUB_TOKEN-generated label events, so we catch these on
    #    'opened' instead. The body-text guard ensures we only act on real
    #    submission-form issues. Guarding on label absence prevents a double-run
    #    when an issue template pre-applies the label (that path uses condition 1).
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'submission') ||
      (github.event.action == 'opened' &&
       contains(github.event.issue.body, 'automatically created via the submission form') &&
       !contains(github.event.issue.labels.*.name, 'submission'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Skip multi-URL submissions (handled by split-submission workflow)
        id: guard
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          count=$(printf '%s' "$ISSUE_BODY" | grep -cP '^\d+\.\s+https?://' || true)
          if [ "${count:-0}" -gt 1 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Multi-URL submission ($count URLs) — skipping; split-submission workflow handles this."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: |
          pip install requests beautifulsoup4 anthropic

      - name: Check for duplicates
        id: check_duplicate
        if: steps.guard.outputs.skip != 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python scripts/check_duplicates.py

      - name: Extract URL and evaluate
        id: evaluate
        if: steps.guard.outputs.skip != 'true' && steps.check_duplicate.outputs.is_duplicate != 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/evaluate_submission.py

      - name: Read evaluation outputs
        id: read_outputs
        if: steps.guard.outputs.skip != 'true' && steps.check_duplicate.outputs.is_duplicate != 'true'
        run: |
          echo "score=$(cat evaluation_score.txt)" >> $GITHUB_OUTPUT
          if [ -f submission_data.json ]; then
            echo "has_data=true" >> $GITHUB_OUTPUT
          else
            echo "has_data=false" >> $GITHUB_OUTPUT
          fi

      - name: Post evaluation results
        if: steps.guard.outputs.skip != 'true' && steps.check_duplicate.outputs.is_duplicate != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('evaluation_results.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: results
            });

      - name: Add result label
        if: steps.guard.outputs.skip != 'true' && steps.check_duplicate.outputs.is_duplicate != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const score = parseInt(fs.readFileSync('evaluation_score.txt', 'utf8').trim());

            let label = 'needs-review';
            if (score === 3) {
              label = 'auto-approved';
            } else if (score === 2) {
              label = 'needs-review';
            } else {
              label = 'needs-review';  // Even rejected ones go to needs-review for admin decision
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });

            // Add info comment for low scores
            if (score < 2) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **Admin Review Required**\n\nThis submission scored ${score}/3 and needs manual verification.\n\n**To approve:** Comment \`/approve\` or \`/approve 3\` (to override score)\n**To reject:** Add the \`rejected\` label and close the issue`
              });
            }

      - name: Upload submission data as artifact
        if: steps.guard.outputs.skip != 'true' && steps.check_duplicate.outputs.is_duplicate != 'true' && steps.read_outputs.outputs.has_data == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: submission-data-${{ github.event.issue.number }}
          path: submission_data.json
          retention-days: 90

      - name: Create PR if score >= 2
        if: steps.guard.outputs.skip != 'true' && steps.check_duplicate.outputs.is_duplicate != 'true' && fromJSON(steps.read_outputs.outputs.score) >= 2 && steps.read_outputs.outputs.has_data == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python scripts/create_submission_pr.py
