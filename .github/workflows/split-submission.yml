name: Split Multi-URL Submission

on:
  issues:
    types: [opened, labeled]

jobs:
  split:
    # Only run on submission issues that contain more than one real URL.
    # Triggers when opened with the label already applied, or when the label
    # is added later (e.g. by an admin to a manually-created issue).
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'submission') ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'submission'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Count submitted URLs
        id: url-count
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Count lines matching "N. https://..." that are not placeholders ("-")
          count=$(printf '%s' "$ISSUE_BODY" | grep -cP '^\d+\.\s+https?://' || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "${count:-0}" -gt 1 ]; then
            echo "is_multi=true" >> "$GITHUB_OUTPUT"
            echo "Multi-URL submission detected ($count URLs) — will split."
          else
            echo "is_multi=false" >> "$GITHUB_OUTPUT"
            echo "Single-URL submission — nothing to split."
          fi

      - name: Checkout
        if: steps.url-count.outputs.is_multi == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        if: steps.url-count.outputs.is_multi == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.url-count.outputs.is_multi == 'true'
        run: pip install requests beautifulsoup4 anthropic

      - name: Split submission into child issues
        if: steps.url-count.outputs.is_multi == 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/split_submission.py
